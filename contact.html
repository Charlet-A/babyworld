<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('images/bby.avif') center/cover no-repeat;
            overflow: hidden;
        }

        /* Advanced Glass Container */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(42, 1, 48, 0.637);
            width: 100%;
            max-width: 500px;
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 40px 60px rgba(0,0,0,0.1);
            position: relative;
        }

        h2 { font-weight: 200; color: rgb(63, 3, 55); font-size: 2.5rem; margin-bottom: 30px; letter-spacing: 2px; }

        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            transition: 0.4s;
        }

        .input-field:focus {
            background: rgba(255,255,255,0.1);
            border-color: #380342;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: white;
            color: #333;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #ffb7c5; color: white; }

       .back-btn-container {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08), inset 0 0 8px rgba(255,255,255,0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #ff69a6;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease, stroke 0.3s ease;
        }

        .back-btn:hover {
            transform: scale(1.15) rotate(-15deg);
            background: rgba(255, 255, 255, 0.8);
            border-color: #ff90c8;
            box-shadow: 0 12px 24px rgba(255, 105, 166, 0.2);
        }

        .back-btn:hover svg {
            transform: translateX(-3px);
            stroke: #38BDF8;
        }

        .back-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="back-btn-container">
        <a href="index.html" class="back-btn" title="Go Back">
            <svg viewBox="0 0 24 24">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </a>
    </div>

    <div class="glass-card">
        <h2>CONNECT</h2>
        <form>
            <input type="text" class="input-field" placeholder="Full Name" required>
            <input type="email" class="input-field" placeholder="Email Address" required>
            <textarea class="input-field" rows="3" placeholder="Message"></textarea>
            <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>
    </div>

</body>
</html>
