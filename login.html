<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #FFDEE9, #B5FFFC, #FFE5EC, #E0F2FE);
            background-size: 400% 400%;
            animation: fluidGradient 12s ease infinite;
            position: relative;
        }

        @keyframes fluidGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Advanced Back Button --- */
        .back-btn-container {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08), inset 0 0 8px rgba(255,255,255,0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #ff69a6;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease, stroke 0.3s ease;
        }

        .back-btn:hover {
            transform: scale(1.15) rotate(-15deg);
            background: rgba(255, 255, 255, 0.8);
            border-color: #ff90c8;
            box-shadow: 0 12px 24px rgba(255, 105, 166, 0.2);
        }

        .back-btn:hover svg {
            transform: translateX(-3px);
            stroke: #38BDF8;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        /* --- Bottom Wave Animation --- */
        .waves {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15vh;
            min-height: 100px;
            max-height: 150px;
            z-index: 1;
            pointer-events: none;
        }

        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55, .5, .45, .5) infinite;
        }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; fill: rgba(255, 255, 255, 0.7); }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; fill: rgba(240, 249, 255, 0.5); }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; fill: rgba(255, 229, 236, 0.3); }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; fill: rgba(255, 255, 255, 1); }

        @keyframes move-forever {
            0% { transform: translate3d(-90px, 0, 0); }
            100% { transform: translate3d(85px, 0, 0); }
        }

        /* --- Ambient Orbs --- */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            z-index: 2;
            animation: floatOrb 8s infinite ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; background: #FFC0CB; top: -50px; left: -50px; }
        .orb-2 { width: 250px; height: 250px; background: #BAE6FD; bottom: 50px; right: -50px; animation-delay: -4s; }

        @keyframes floatOrb {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-30px) scale(1.1) rotate(180deg); }
        }

        /* --- Background Clouds --- */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.4;
            z-index: 3;
            animation: moveCloud 30s linear infinite;
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud1 { width: 140px; height: 50px; top: 15%; left: -200px; }
        .cloud1::before { width: 60px; height: 60px; top: -25px; left: 20px; }
        .cloud1::after { width: 70px; height: 70px; top: -35px; right: 20px; }
        .cloud2 { width: 180px; height: 60px; bottom: 25%; left: -250px; animation-delay: 8s; }
        .cloud2::before { width: 80px; height: 80px; top: -35px; left: 25px; }
        .cloud2::after { width: 90px; height: 90px; top: -45px; right: 25px; }

        @keyframes moveCloud {
            0% { transform: translateX(0); }
            100% { transform: translateX(1800px); }
        }

        /* ===== Main Card Container with Flip Perspective ===== */
        .card-perspective {
            perspective: 1500px;
            width: 850px; 
            height: 540px; 
            z-index: 10;
        }

        .login-container {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Sign-up Mode Animation Class Triggered by JS */
        .card-perspective.signup-mode .login-container {
            transform: rotateY(180deg);
        }

        /* Front & Back Panel Views */
        .panel-front, .panel-back {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 40px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(148, 163, 184, 0.15), inset 0 0 12px rgba(255,255,255,0.5);
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .panel-back {
            transform: rotateY(180deg);
        }

        /* ===== Left Side Visual Panel ===== */
        .left-side {
            width: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(180deg, rgba(142, 223, 255, 0.75), rgba(183, 240, 255, 0.75));
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
        }

        /* Floating Moon */
        .moon {
            width: 65px;
            height: 65px;
            background: #fff6c4;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 245, 170, 0.6);
            position: absolute;
            top: 30px;
            left: 40px;
            animation: moonFloat 4s ease-in-out infinite alternate;
        }

        @keyframes moonFloat {
            from { transform: translateY(0px); }
            to { transform: translateY(-8px); }
        }

        /* ===== New Advanced Circle/Oval Baby Image Container ===== */
        .baby-image-container {
            position: relative;
            width: 300px;  
            height: 320px; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            margin-top: 15px;
            animation: babyFloat 5s ease-in-out infinite;
            border-radius: 50%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.4);
            border: 4px dashed rgba(80, 3, 70, 0.7);
            box-shadow: 0 15px 35px rgba(100, 140, 180, 0.3);
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .baby-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background-color: #f807ec;
        }

        @keyframes babyFloat {
            0% { transform: translateY(0px) scale(1) rotate(0deg); }
            50% { transform: translateY(-12px) scale(1.03) rotate(2deg); }
            100% { transform: translateY(0px) scale(1) rotate(0deg); }
        }

        .baby-image-container:hover {
            transform: scale(1.05) rotate(-2deg);
            border-color: #ff69a6;
            box-shadow: 0 20px 40px rgba(255, 105, 166, 0.3);
        }
        /* ===== Right Side Form Panel ===== */
        .right-side {
            width: 50%;
            background: rgba(255, 255, 255, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .form-box {
            width: 100%;
            max-width: 320px;
        }

        .form-box h1 {
            font-family: 'Brush Script Mt', cursive;
            font-size: 40px;
            color: #ff69a6;
            margin-bottom: 6px;
            font-weight: 800;
        }

        .form-box p {
            color: #64748B;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* ===== Input Layouts ===== */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid transparent;
            outline: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            color: #334155;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .input-group input:focus {
            transform: scale(1.01);
            background: #ffffff;
            border-color: #ffb6d9;
            box-shadow: 0 0 0 4px rgba(255, 182, 217, 0.2), 0 8px 20px rgba(0,0,0,0.04);
        }

        /* ===== Shiny Glow Button Animation ===== */
        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #ff90c8, #ff69a6, #38BDF8);
            background-size: 200% auto;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden; 
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 8px 20px rgba(255, 144, 200, 0.3);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
        }

        .login-btn:hover {
            background-position: right center;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 25px rgba(56, 189, 248, 0.35), 0 0 15px rgba(255, 105, 166, 0.2);
            letter-spacing: 0.8px;
        }

        .login-btn:hover::before {
            left: 150%;
            transition: all 0.8s ease-in-out;
        }

        .login-btn:active {
            transform: translateY(-1px) scale(0.99);
        }

        /* ===== Bottom Navigation Link ===== */
        .bottom {
            margin-top: 20px;
            text-align: center;
            color: #64748B;
            font-size: 13px;
        }

        .bottom a {
            text-decoration: none;
            color: #ff69a6;
            font-weight: 700;
            transition: color 0.3s;
            cursor: pointer;
        }

        .bottom a:hover {
            color: #38BDF8;
            text-decoration: underline;
        }

        /* ===== Responsive Fixes ===== */
        @media(max-width: 850px) {
            .card-perspective {
                width: 90%;
                height: auto;
                margin: 20px;
            }

            .login-container {
                height: auto;
            }

            .panel-front, .panel-back {
                position: relative;
                flex-direction: column;
                height: auto;
                backface-visibility: visible;
                -webkit-backface-visibility: visible;
            }

            .panel-back {
                transform: none;
                display: none; 
            }

            .card-perspective.signup-mode .panel-front { display: none; }
            .card-perspective.signup-mode .panel-back { display: flex; }
            .card-perspective.signup-mode .login-container { transform: none; }

            .left-side, .right-side {
                width: 100%;
            }

            .left-side {
                padding: 40px 20px;
            }

            .baby-image-container {
                width: 180px;
                height: 180px;
            }

            .back-btn-container {
                top: 15px;
                left: 15px;
            }
            
            .back-btn {
                width: 45px;
                height: 45px;
            }
        }
    </style>
</head>
<body>

    <!-- ADVANCED BACK BUTTON -->
    <div class="back-btn-container">
        <a href="index.html" class="back-btn" title="Go Back">
            <svg viewBox="0 0 24 24">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </a>
    </div>

    <!-- Ambient Floating Blur Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Animated Floating Clouds -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <!-- PERSPECTIVE CONTAINER FOR FLIP EFFECT -->
    <div class="card-perspective" id="cardContainer">
        <div class="login-container">

            <!-- ================= FRONT PANEL: LOGIN ================= -->
            <div class="panel-front">
                <!-- Left Side Display Window -->
                <div class="left-side">
                    <div class="moon"></div>
                    
                    <!-- Premium Rounded Baby Image Container -->
                    <div class="baby-image-container">
                        <img src="images/b3.jpg" alt="Cute Baby">
                    </div>
                </div>

                <!-- Right Side Form Window -->
                <div class="right-side">
                    <div class="form-box">
                        <h1>Welcome</h1>
                        <p>Login to your cute baby world ✨</p>

                        <form action="register.php" method="POST"autocomplete="off" onsubmit="event.preventDefault();">
                            <div class="input-group">
                                <input type="text" name="name" placeholder="Full Name" required>
                            </div>
<div class="input-group">
                                <input type="email" name="email" placeholder="Email" required>
                            </div>
                            <div class="input-group">
                                <input type="password" name="password" placeholder="Password" required>
                            </div>

                            <button type="submit" class="login-btn">Register</button>
                        </form>

                        <div class="bottom">
                            Don’t have an account? <a id="toSignup">Sign Up</a>
                        </div>
                    </div>
                </div>
            </div>


            <!-- ================= BACK PANEL: SIGN UP ================= -->
            <div class="panel-back">
                <!-- Left Side Display Window -->
                <div class="left-side" style="background: linear-gradient(180deg, rgba(255, 182, 193, 0.75), rgba(255, 218, 224, 0.75));">
                    <div class="moon" style="background: #fffbdf;"></div>
                    
                    <!-- Same Cute Baby Container for Continuity -->
                    <div class="baby-image-container" style="border-color: rgba(255, 255, 255, 0.8);">
                        <img src="images/b2.jpg" alt="Cute Baby Register">
                    </div>
                    
                    <div class="left-text">Join Us</div>
                </div>

                <!-- Right Side Form Window (Sign Up Fields) -->
                <div class="right-side">
                    <div class="form-box">
                        <h1>Sign Up</h1>
                        <p>Create your magic account ✨</p>

                        <form action="login.php" method="POST" autocomplete="off" onsubmit="event.preventDefault();">
                            <div class="input-group">
                                <input type="text" placeholder="Full Name" required>
                            </div>

                            <div class="input-group">
                               <input type="text" name="email" placeholder="Email" required>
                            </div>

                            <div class="input-group">
                                 <input type="password" name="password" placeholder="Password" required>
                            </div>

                            <button type="submit" class="login-btn" style="background: linear-gradient(135deg, #ff69a6, #ff90c8, #BAE6FD);">Register</button>
                        </form>

                        <div class="bottom">
                            Already have an account? <a id="toLogin">Login</a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Parallax Moving Wave Layer -->
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h240v-44" />
        </defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" />
            <use xlink:href="#gentle-wave" x="48" y="3" />
            <use xlink:href="#gentle-wave" x="48" y="5" />
            <use xlink:href="#gentle-wave" x="48" y="7" />
        </g>
    </svg>

    <!-- JavaScript For Smooth Toggle Animation -->
    <script>
        const cardContainer = document.getElementById('cardContainer');
        const toSignupBtn = document.getElementById('toSignup');
        const toLoginBtn = document.getElementById('toLogin');

        // Turn to Sign Up Page
        toSignupBtn.addEventListener('click', (e) => {
            e.preventDefault();
            cardContainer.classList.add('signup-mode');
        });

        // Turn Back to Login Page
        toLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            cardContainer.classList.remove('signup-mode');
        });
    </script>
</body>
</html>
